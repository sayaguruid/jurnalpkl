<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Jurnal PKL</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HALAMAN LOGIN -->
  <div id="login-page" class="container">
    <div class="card">
      <h2 class="title">Login Siswa</h2>
      <p class="subtitle">Gunakan NIS: 12345 (untuk tes)</p>
      
      <div class="form-group">
        <label>Masukkan NIS</label>
        <input type="number" id="nis" placeholder="Contoh: 12345">
      </div>
      
      <button onclick="handleLogin()" class="btn-primary">Masuk</button>
      <div id="login-msg" class="msg"></div>
    </div>
  </div>

  <!-- HALAMAN DASHBOARD -->
  <div id="dashboard-page" class="container hidden">
    <div class="header">
      <div class="user-info">
        <span id="nama-siswa">Nama Siswa</span> | 
        <span id="kelas-siswa">Kelas</span>
      </div>
      <button onclick="handleLogout()" class="btn-secondary">Keluar</button>
    </div>

    <div class="nav">
      <div class="nav-item active" onclick="openTab('jurnal')">Jurnal</div>
      <div class="nav-item" onclick="openTab('catatan')">Catatan</div>
      <div class="nav-item" onclick="openTab('foto')">Dokumentasi</div>
    </div>

    <!-- TAB JURNAL -->
    <div id="tab-jurnal" class="tab-content">
      <div class="card">
        <h3>Isi Jurnal Harian</h3>
        <div class="form-group"><label>Tanggal</label><input type="date" id="j-tgl"></div>
        
        <div class="form-group">
          <label>Kehadiran</label>
          <select id="j-hadir">
            <option value="Hadir">Hadir</option>
            <option value="Izin">Izin</option>
            <option value="Sakit">Sakit</option>
            <option value="Alpha">Alpha</option>
          </select>
        </div>

        <div class="form-group"><label>Unit Kerja</label><input type="text" id="j-unit" placeholder="Contoh: Admin / Teknisi"></div>
        <div class="form-group"><label>Catatan Kegiatan</label><textarea id="j-catatan" rows="3" placeholder="Deskripsi pekerjaan hari ini..."></textarea></div>
        
        <button onclick="saveJurnal()" class="btn-primary">Simpan Jurnal</button>
        <div id="j-msg" class="msg"></div>
      </div>
      
      <div class="card">
        <h3>Riwayat Jurnal</h3>
        <div class="table-responsive">
          <table id="tabel-jurnal">
            <thead><tr><th>Tanggal</th><th>Status</th><th>Unit</th><th>Catatan</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- TAB CATATAN -->
    <div id="tab-catatan" class="tab-content hidden">
      <div class="card">
        <h3>Input Catatan Kegiatan</h3>
        <div class="form-group"><label>Tanggal</label><input type="date" id="c-tgl"></div>
        <div class="form-group"><label>Nama Pekerjaan</label><input type="text" id="c-kerja" placeholder="Proyek / Tugas"></div>
        <div class="form-group"><label>Perencanaan</label><textarea id="c-plan" rows="2" placeholder="Rencana kerja..."></textarea></div>
        <div class="form-group"><label>Pelaksanaan</label><textarea id="c-do" rows="2" placeholder="Hasil pelaksanaan..."></textarea></div>
        
        <button onclick="saveCatatan()" class="btn-primary">Simpan Catatan</button>
        <div id="c-msg" class="msg"></div>
      </div>

      <div class="card">
        <h3>Riwayat Catatan</h3>
        <div class="table-responsive">
          <table id="tabel-catatan">
            <thead><tr><th>Tanggal</th><th>Pekerjaan</th><th>Hasil</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- TAB FOTO -->
    <div id="tab-foto" class="tab-content hidden">
      <div class="card">
        <h3>Upload Foto Kegiatan</h3>
        <div class="form-group"><label>Tanggal</label><input type="date" id="d-tgl"></div>
        <div class="form-group"><label>Pilih Foto</label><input type="file" id="d-file" accept="image/*"></div>
        <div class="form-group"><label>Keterangan</label><input type="text" id="d-ket" placeholder="Keterangan foto..."></div>
        
        <button onclick="uploadFoto()" class="btn-primary">Upload Foto</button>
        <div id="d-msg" class="msg"></div>
      </div>

      <div class="card">
        <h3>Galeri Foto</h3>
        <div id="galeri" class="gallery"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
